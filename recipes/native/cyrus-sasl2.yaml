id: cyrus-sasl2
provides: []
pkgconfig:
- cyrus-sasl2
- dblib
- plugindir
buildsystem: autotools
source:
  type: archive
  url: https://github.com/cyrusimap/cyrus-sasl/archive/cyrus-sasl-2.1.28.tar.gz
  sha256: 3e38933a30b9ce183a5488b4f6a5937a702549cde0d3287903d80968ad4ec341
config-opts:
- --with-dblib=berkeley
- --without-pam
- --without-opie
- --without-des
- --disable-gssapi
- --enable-cram
- --enable-digest
- --enable-otp
- --enable-plain
- --enable-login
- --with-plugindir=/app/lib/sasl2
cleanup:
- /include
- /lib/pkgconfig
