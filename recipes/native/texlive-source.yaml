id: texlive-source
provides: []
pkgconfig:
- texlive-source
- banner-add
- system-cairo
- system-fontconfig
- system-freetype2
- system-gmp
- system-graphite2
- system-harfbuzz
- system-icu
- system-libpng
- system-pixman
- system-zlib
buildsystem: autotools
source:
  type: archive
  url: https://ftp.tu-chemnitz.de/pub/tug/historic/systems/texlive/2026/texlive-20260301-source.tar.xz
config-opts:
- --bindir=${FLATPAK_DEST}/bin/${FLATPAK_ARCH}-linux
- --datarootdir=${FLATPAK_DEST}
- --disable-hitex
- --disable-native-texlive-build
- --with-banner-add= - Flatpak
- --without-x
- --with-system-cairo
- --with-system-fontconfig
- --with-system-freetype2
- --with-system-gmp
- --with-system-graphite2
- --with-system-harfbuzz
- --with-system-icu
- --with-system-libpng
- --with-system-pixman
- --with-system-zlib
cleanup:
- /include
- /lib/pkgconfig
