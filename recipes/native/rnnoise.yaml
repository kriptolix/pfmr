id: rnnoise
provides: []
pkgconfig:
- rnnoise
- pic
buildsystem: autotools
source:
  type: archive
  url: https://github.com/GregorR/rnnoise-nu/archive/26269304e120499485438cd93acf5127c6908c68.zip
  sha256: 93a994a3d59cb89c005f0f861fd522fe268780dc0e2e2acea56945305ed0cbf1
config-opts:
- --disable-examples
- --disable-doc
- --disable-shared
- --enable-static
- --with-pic
- 'CFLAGS=-Dpitch_downsample=rnnoise_pitch_downsample -Dpitch_search=rnnoise_pitch_search
  -Dremove_doubling=rnnoise_remove_doubling -D_celt_lpc=rnnoise__celt_lpc -Dcelt_iir=rnnoise_celt_iir
  -D_celt_autocorr=rnnoise__celt_autocorr -Dcompute_gru=rnnoise_compute_gru -Dcompute_dense=rnnoise_compute_dense

  '
cleanup:
- /include
- /lib/pkgconfig
