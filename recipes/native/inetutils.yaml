id: inetutils
provides: []
pkgconfig:
- inetutils
buildsystem: autotools
source:
  type: archive
  url: https://ftp.gnu.org/gnu/inetutils/inetutils-2.7.tar.gz
  sha256: a156be1cde3c5c0ffefc262180d9369a60484087907aa554c62787d2f40ec086
config-opts:
- --disable-servers
- --disable-ifconfig
- --disable-logger
- --disable-syslogd
- --disable-hostname
- --disable-traceroute
- --disable-talk
- --disable-rcp
- --disable-rlogin
- --disable-rsh
- --disable-rexec
cleanup:
- /include
- /lib/pkgconfig
