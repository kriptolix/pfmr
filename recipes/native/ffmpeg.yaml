id: ffmpeg
provides: []
pkgconfig:
- ffmpeg
buildsystem: autotools
source:
  type: archive
  url: https://ffmpeg.org/releases/ffmpeg-8.1.tar.xz
  sha256: b072aed6871998cce9b36e7774033105ca29e33632be5b6347f3206898e0756a
config-opts:
- --enable-rpath
- --enable-gpl
- --disable-static
- --enable-shared
- --disable-doc
- --disable-ffplay
- --disable-ffprobe
- --enable-libmp3lame
- --enable-libvorbis
- --enable-libopus
- --enable-libsoxr
cleanup:
- /include
- /lib/pkgconfig
- /share/ffmpeg
