id: ncurses
provides: []
pkgconfig:
- ncurses
- shared
- termlib
- versioned-syms
buildsystem: autotools
source:
  type: archive
  url: https://ftp.gnu.org/gnu/ncurses/ncurses-6.3.tar.gz
  sha256: 97fc51ac2b085d4cde31ef4d2c3122c21abc217e9090a43a30fc5ec21684e059
config-opts:
- --prefix=${FLATPAK_DEST}
- --with-shared
- --with-termlib=tinfo
- --with-versioned-syms
cleanup:
- /bin
- /include
- /share/man
- /lib/*.a
- /lib/*.la
