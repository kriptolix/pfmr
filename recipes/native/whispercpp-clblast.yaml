id: whispercpp-clblast
provides: []
pkgconfig:
- whispercpp-clblast
buildsystem: cmake-ninja
source:
  type: archive
  url: https://github.com/ggerganov/whisper.cpp/archive/refs/tags/v1.6.2.tar.gz
  sha256: da7988072022acc3cfa61b370b3c51baad017f1900c3dc4e68cb276499f66894
config-opts:
- -DCMAKE_BUILD_TYPE=Release
- -DCMAKE_POSITION_INDEPENDENT_CODE=ON
- -DBUILD_SHARED_LIBS=ON
- -DWHISPER_BUILD_TESTS=OFF
- -DWHISPER_BUILD_EXAMPLES=OFF
- -DWHISPER_CLBLAST=ON
- -DWHISPER_NO_AVX2=ON
- -DWHISPER_NO_FMA=ON
- -DCMAKE_C_FLAGS=-O3
- -DCMAKE_CXX_FLAGS=-O3
- -DWHISPER_TARGET_NAME=whisper-clblast
cleanup:
- /include
- /lib/pkgconfig
