id: gconf
provides: []
pkgconfig:
- gconf
buildsystem: autotools
source:
  type: archive
  url: https://download.gnome.org/sources/GConf/3.2/GConf-3.2.6.tar.xz
  sha256: 1912b91803ab09a5eed34d364bf09fe3a2a9c96751fde03a4e0cfa51a04d784c
config-opts:
- --disable-static
- --disable-gtk-doc
- --disable-orbit
- --disable-introspection
cleanup:
- /bin
- /libexec
- /share/sgml
- /etc/xdg/autostart
- /share/dbus-1
