id: ncurses5
provides: []
pkgconfig:
- ncurses5
- shared
- normal
- cxx-binding
- cxx-shared
- versioned-syms
- abi-version
buildsystem: autotools
source:
  type: archive
  url: https://ftp.gnu.org/pub/gnu/ncurses/ncurses-6.5.tar.gz
  sha256: 136d91bc269a9a5785e5f9e980bc76ab57428f604ce3e5a5a90cebc767971cc6
config-opts:
- --with-shared
- --with-normal
- --without-debug
- --without-ada
- --enable-widec
- --disable-pc-files
- --with-cxx-binding
- --with-cxx-shared
- --with-versioned-syms
- --with-abi-version=5
cleanup:
- /bin
- /include
- /lib/*.a
- /lib/*.so
