id: assimp
provides: []
pkgconfig:
- assimp
buildsystem: cmake-ninja
source:
  type: archive
  url: https://github.com/assimp/assimp/archive/v5.2.5.tar.gz
  sha256: b5219e63ae31d895d60d98001ee5bb809fb2c7b2de1e7f78ceeb600063641e1a
config-opts:
- -DASSIMP_BUILD_ALL_IMPORTERS_BY_DEFAULT:BOOL=NO
