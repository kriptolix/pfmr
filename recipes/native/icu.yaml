id: icu
provides: []
pkgconfig:
- icu
buildsystem: autotools
source:
  type: archive
  url: https://github.com/unicode-org/icu/releases/download/release-56-1/icu4c-56_1-src.tgz
  sha256: 3a64e9105c734dcf631c0b3ed60404531bce6c0f5a64bfe1a6402a4cc2314816
config-opts:
- --sbindir=${FLATPAK_DEST}/bin
- --disable-extras
- --disable-icuio
- --disable-layout
- --disable-layoutx
- --disable-tests
- --disable-samples
cleanup:
- /bin
- /lib/icu
- /lib/libicutest.so*
- /lib/libicutu.so*
- /share/icu
- /share/man
