# pfmr native dependency hints
# Formato: cada entrada mapeia um nome de pacote Python (canonico) para
# suas dependencias nativas conhecidas (pkg-config names e sonames).
#
# Este banco e consultado pelo NativeDependencyAnalyzer como fonte primaria
# de conhecimento, antes de qualquer inspecao dinamica de ELF ou wheel.
#
# Campos:
#   pkgconfig  — nomes pkg-config que o pacote precisa no build
#   libraries  — sonames que o pacote linka em runtime
#   headers    — headers C necessarios (para builds from source)
#   extras     — notas / contexto adicional

[cryptography]
pkgconfig = ["openssl", "libffi"]
libraries = ["libssl.so.3", "libcrypto.so.3", "libffi.so.8"]
headers   = ["openssl/ssl.h", "ffi.h"]

[cffi]
pkgconfig = ["libffi"]
libraries = ["libffi.so.8"]
headers   = ["ffi.h"]

[lxml]
pkgconfig = ["libxml-2.0", "libxslt"]
libraries = ["libxml2.so.2", "libxslt.so.1"]
headers   = ["libxml/tree.h", "libxslt/xslt.h"]

[pillow]
pkgconfig = ["libpng", "libjpeg", "libtiff-4", "libwebp", "libopenjp2", "freetype2", "zlib"]
libraries = ["libpng16.so.16", "libjpeg.so.62", "libtiff.so.6", "libwebp.so.7", "libz.so.1"]
headers   = ["png.h", "jpeglib.h"]

[pycurl]
pkgconfig = ["libcurl", "openssl"]
libraries = ["libcurl.so.4"]
headers   = ["curl/curl.h"]

[psycopg2]
pkgconfig = ["libpq"]
libraries = ["libpq.so.5"]
headers   = ["libpq-fe.h"]

[numpy]
pkgconfig = ["cblas", "openblas"]
libraries = ["libopenblas.so.0"]
headers   = []
extras    = "May also need gfortran when building from sdist"

[scipy]
pkgconfig = ["cblas", "openblas"]
libraries = ["libopenblas.so.0", "libgfortran.so.5"]
headers   = []
extras    = "Requires gfortran SDK extension when building from sdist"

[pandas]
pkgconfig = []
libraries = []
headers   = []
extras    = "Pure Python since 2.0 except optional C extensions; numpy required at runtime"

[grpcio]
pkgconfig = ["openssl", "zlib"]
libraries = ["libssl.so.3", "libz.so.1"]
headers   = ["openssl/ssl.h", "zlib.h"]

[aiohttp]
