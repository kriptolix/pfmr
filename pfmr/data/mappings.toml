# ---------------------------------------------------------------------------
# Shared libraries always present in any Flatpak runtime baseline
# Used by: NativeDependencyAnalyzer (ELF filter), BuildSandboxProber
# These are NEVER added as native_deps — they come from glibc/libstdc++
# ---------------------------------------------------------------------------
[runtime_baseline_libs]
libs = [
  "libpthread.so.0",
  "libm.so.6",
  "libc.so.6",
  "libdl.so.2",
  "librt.so.1",
  "libutil.so.1",
  "libgcc_s.so.1",
  "libstdc++.so.6",
  "ld-linux-x86-64.so.2",
  "ld-linux-aarch64.so.1",
  "ld-linux-armhf.so.3",
  "linux-vdso.so.1",
  "linux-gate.so.1",
]

# Soname prefixes matching glibc dynamic linker variants
baseline_prefixes = ["linux-vdso", "ld-linux", "linux-gate"]

# ---------------------------------------------------------------------------
# Indicators that a module is the application itself (not a dependency)
# Used by: ManifestAnalyzer to skip the app module
#
# A module is considered the app module when it:
#   - has sources of type "dir" (local source tree)
#   - AND appears last in the module list (conventional position)
#   - OR has buildsystem matching the project type with a local dir source
#
# buildsystem values that typically indicate the app, not a dep:
# ---------------------------------------------------------------------------
[app_module_indicators]
# Source types that signal "this is the app being built, not a dependency"
app_source_types = ["dir"]

# Module names that are always the app (regardless of source type)
# Add known app module names here if the heuristic misses them
always_app_names = []

# Module names that are never the app (always deps, even if last)
never_app_names = [
  "python3",
  "python",
  "pip",
  "setuptools",
  "glib",
  "gtk",
  "gtk3",
  "gtk4",
  "libffi",
  "openssl",
  "zlib",
  "libusb",
  "hidapi",
]

# ---------------------------------------------------------------------------
# Module names that are meta/bootstrap and should always be skipped
# Used by: ManifestAnalyzer, SharedModulesImporter
# ---------------------------------------------------------------------------
[skip_module_names]
names = [
  "platform-bootstrap",
  "sdk-bootstrap",
  "python3",
  "python",
  "pip",
  "setuptools",
  "wheel",
  "build-tools",
  "host-tools",
]