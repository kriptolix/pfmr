# pfmr/data/mappings.toml
# ========================
# Global name correspondence tables used across all pfmr subsystems.
# Edit this file to add new mappings — no code changes needed.
#
# Sections:
#   [module_to_pkgconfig]   Flatpak module name  → pkg-config name(s)
#   [module_to_soname]      Flatpak module name  → shared library soname(s)
#   [pkgconfig_to_soname]   pkg-config name      → shared library soname(s)
#   [python_import_names]   PyPI package name    → Python import name
#   [runtime_baseline_libs] sonames always present in any Flatpak runtime
#   [app_module_indicators] patterns that identify the app module (to skip)

# ---------------------------------------------------------------------------
# Flatpak module name → pkg-config name(s)
# Used by: ManifestAnalyzer, SharedModulesImporter
