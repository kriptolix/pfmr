extension_id = "org.freedesktop.Sdk.Extension.llvm18"
display_name = "LLVM 18"
description = """
LLVM 18 toolchain. Required by packages that need clang, LLVM libs,
or build via llvmlite (e.g. numba). Also used by some Rust crates that
link against LLVM.
"""

mount_path = "/usr/lib/sdk/llvm18"

build_backends = []

pkgconfig_triggers = ["llvm", "clang"]
library_triggers   = ["libLLVM.so", "libclang.so"]

package_triggers = [
  "llvmlite",
  "numba",
]

provides_executables = ["clang", "clang++", "llvm-config", "llc", "opt", "lld"]
provides_pkgconfig   = ["llvm", "clang"]
provides_libraries   = ["libLLVM.so", "libclang.so"]

[env]
PATH = "/usr/lib/sdk/llvm18/bin:$PATH"
LLVM_CONFIG = "/usr/lib/sdk/llvm18/bin/llvm-config"

compatible_sdks = ["org.freedesktop.Sdk", "org.gnome.Sdk", "org.kde.Sdk"]