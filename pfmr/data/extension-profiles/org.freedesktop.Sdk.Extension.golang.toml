extension_id = "org.freedesktop.Sdk.Extension.golang"
display_name = "Go toolchain"
description = """
Go toolchain for packages that compile Go code as part of their build,
e.g. go-jsonnet, or Python bindings to Go libraries.
"""

mount_path = "/usr/lib/sdk/golang"

build_backends = []

pkgconfig_triggers = []
library_triggers   = []

package_triggers = [
  "go-jsonnet",
]

provides_executables = ["go", "gofmt"]
provides_pkgconfig   = []
provides_libraries   = []

[env]
PATH    = "/usr/lib/sdk/golang/bin:$PATH"
GOROOT  = "/usr/lib/sdk/golang"
GOPATH  = "/run/build/gopath"
GOFLAGS = "-mod=vendor"

compatible_sdks = ["org.freedesktop.Sdk", "org.gnome.Sdk", "org.kde.Sdk"]